name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  php-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.2"
      - name: php -l (lint every PHP file)
        run: |
          set -e
          find . -path ./vendor -prune -o -name '*.php' -print | while read -r f; do
            php -l "$f"
          done

  php-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.2"
      - name: Run standalone behavior tests (no WP install required)
        run: php tests/test-token-broker.php

  readme-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: readme.txt has required headers + matching Stable tag
        run: |
          set -e
          test -f readme.txt
          grep -qE '^Stable tag: ' readme.txt
          grep -qE '^License: GPL-2.0-or-later' readme.txt
          stable="$(grep -E '^Stable tag: ' readme.txt | head -1 | sed -E 's/^Stable tag:[[:space:]]*//')"
          header="$(grep -E '^\s*\*\s*Version:' cinatra.php | head -1 | sed -E 's/.*Version:[[:space:]]*//')"
          echo "readme Stable tag = $stable ; plugin header Version = $header"
          test "$stable" = "$header"

  yaml-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Explicit dependency: yaml.safe_load_all comes from PyYAML, which is NOT
      # in the stdlib. The ubuntu-latest image ships yamllint via pipx (isolated
      # from the system python3), so a bare `import yaml` is not a guaranteed
      # runner contract — install it explicitly so the dependency is not
      # silently load-bearing. (Parity note: drupal-module relies on the runner;
      # we diverge intentionally to make the dep explicit.)
      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml
      - name: Parse-validate every YAML file (gating)
        run: |
          python3 - <<'PY'
          import sys, yaml
          from pathlib import Path
          # Path.rglob descends into hidden dirs (e.g. .github/), unlike
          # glob.glob('**', recursive=True) which skips dotted directories and
          # would make this job pass while scanning nothing.
          root = Path('.')
          files = sorted({
              p for pat in ('*.yml', '*.yaml') for p in root.rglob(pat)
              if 'vendor' not in p.parts and '.git' not in p.parts
          })
          if not files:
              print('No YAML files found — refusing to pass vacuously.')
              sys.exit(1)
          bad = 0
          for p in files:
              try:
                  with p.open('r') as fh:
                      list(yaml.safe_load_all(fh))
                  print(f'ok   {p}')
              except Exception as e:
                  print(f'BAD  {p}: {e}')
                  bad += 1
          sys.exit(1 if bad else 0)
          PY

  phpcs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # GATING (#8): the WPCS backlog is triaged and cinatra.php + uninstall.php
    # are clean, so a new WPCS regression now fails the job red.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.2"
          tools: composer
      - name: Install PHPCS + WPCS + PHPCompatibilityWP
        run: composer install --no-interaction --no-progress
      - name: Run PHPCS (phpcs.xml.dist ruleset)
        # Use the committed phpcs.xml.dist (no --standard) so the ruleset is the
        # single source of truth: it sets WordPress + PHPCompatibilityWP,
        # testVersion 7.4-, the cinatra text_domain (so the WP.I18n sniff catches
        # missing-text-domain errors the same way the official Plugin Check does),
        # and scopes to the tracked first-party files.
        run: vendor/bin/phpcs

  plugin-check:
    name: plugin-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # GATING (#8, #16): runs the OFFICIAL WordPress Plugin Check (the
    # plugin-check plugin) against the plugin in a real WordPress + WP-CLI
    # environment. Replaces WordPress/plugin-check-action, whose bundled `wp-env`
    # silently fails to boot on GitHub-hosted runners ("Environment not
    # initialized. Run `wp-env start` first.") — an upstream infra bug, not a
    # plugin finding. This MySQL-service + WP-CLI path is hermetic and reliable.
    services:
      mysql:
        # Service-container images are not `uses:` lines, so the actions-pinned
        # gate does not cover them; a version tag is the correct pin here.
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=30s
    steps:
      - name: Checkout plugin
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: src
      - name: Set up PHP 8.3 + WP-CLI
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.3"
          extensions: mysqli, zip, gd, mbstring, curl, dom, xml
          coverage: none
          tools: wp-cli
          ini-values: memory_limit=512M
      - name: Wait for MySQL
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; then
              echo "MySQL is up."; exit 0
            fi
            echo "Waiting for MySQL... ($i)"; sleep 2
          done
          echo "MySQL did not become ready in time." >&2; exit 1
      - name: Download + install WordPress
        run: |
          set -euo pipefail
          WP="$GITHUB_WORKSPACE/wp"
          mkdir -p "$WP"
          wp core download --path="$WP" --version=latest
          wp config create --path="$WP" \
            --dbname=wordpress --dbuser=root --dbpass=root \
            --dbhost=127.0.0.1:3306 --skip-check
          wp core install --path="$WP" \
            --url=http://localhost --title="PCP CI" \
            --admin_user=admin --admin_password=pcp-ci-throwaway \
            --admin_email=ci@example.com --skip-email
      - name: Place plugin at wp-content/plugins/cinatra
        run: |
          set -euo pipefail
          DEST="$GITHUB_WORKSPACE/wp/wp-content/plugins/cinatra"
          mkdir -p "$DEST"
          # Mirror the checked-out repo (so any NEW shipped file is auto-included
          # — no manual allowlist to drift), excluding dev/CI/build cruft that
          # never ships to WordPress.org. Hidden/dotfiles (.git, .gitignore, …)
          # MUST be excluded: Plugin Check's file_type check fails on any hidden
          # file ("Hidden files are not permitted."), and the real wp.org build
          # (.distignore / svn export) drops them — so shipping them here would be
          # a CI-only false positive. The leading-dot glob covers future dotfiles.
          rsync -a --delete \
            --exclude='.*' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpcs.xml.dist' \
            "$GITHUB_WORKSPACE/src/" "$DEST/"
          ls -la "$DEST"
      - name: Install + activate Plugin Check
        run: |
          set -euo pipefail
          WP="$GITHUB_WORKSPACE/wp"
          wp plugin install plugin-check --activate --path="$WP"
          echo "plugin-check version: $(wp plugin get plugin-check --field=version --path="$WP")"
      - name: Run Plugin Check (gating; fail on any ERROR)
        run: |
          set -euo pipefail
          WP="$GITHUB_WORKSPACE/wp"
          # Load the plugin-check CLI bootstrap so RUNTIME checks run too (not
          # just static checks — WP-CLI runs static-only without this).
          REQUIRE="$WP/wp-content/plugins/plugin-check/cli.php"

          echo "::group::Plugin Check (human-readable)"
          # NOTE: `wp plugin check` exits 0 EVEN WITH errors (verified), so the
          # exit code is never trusted — findings are detected explicitly below.
          wp plugin check cinatra --path="$WP" --require="$REQUIRE" 2>&1 || true
          echo "::endgroup::"

          # ERROR detection: run with --ignore-warnings so the JSON carries ONLY
          # error rows (the per-row `type` field is omitted when a file has only
          # one severity, so filtering on type is unsafe — any row here == error).
          # Capture stdout AND stderr and the command status: a clean run emits a
          # NON-EMPTY success sentinel, so empty/unexpected output is an INFRA
          # failure (wp missing, fatal, bad option) and must FAIL, never pass.
          set +e
          OUT="$(wp plugin check cinatra --path="$WP" --require="$REQUIRE" --format=json --ignore-warnings 2>&1)"
          STATUS=$?
          set -e

          # Trim leading/trailing whitespace for exact-sentinel comparison.
          TRIMMED="$(printf '%s' "$OUT" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ "$TRIMMED" = "Success: Checks complete. No errors found." ]; then
            echo "Plugin Check: no errors found."
            exit 0
          fi

          # Not the clean sentinel: must be a parseable findings payload, else
          # treat as an infra failure (do NOT silently pass).
          if [ -z "$TRIMMED" ]; then
            echo "::error::Plugin Check produced NO output (status=$STATUS) — treating as infra failure, not a pass."
            exit 1
          fi
          BODY="$(printf '%s\n' "$OUT" | grep -v '^FILE:' || true)"
          # Count rows ONLY across actual finding arrays (objects {.. } inside
          # [ .. ]); `select(type=="array")` rejects degenerate JSON like [], {}
          # or null so a CLI error that emits those cannot read as zero findings.
          ERROR_COUNT="$(printf '%s' "$BODY" | jq -s '[ .[] | select(type=="array") ] | reduce .[] as $a (0; . + ($a | length))' 2>/dev/null || echo "PARSE_FAIL")"
          if [ "$ERROR_COUNT" = "PARSE_FAIL" ]; then
            echo "::error::Plugin Check output was neither the clean sentinel nor parseable findings JSON (status=$STATUS). Output above. Failing closed."
            exit 1
          fi
          echo "ERROR findings: ${ERROR_COUNT}"
          if [ "${ERROR_COUNT:-0}" -gt 0 ]; then
            echo "::error::Plugin Check reported ${ERROR_COUNT} ERROR finding(s). See the human-readable output above."
            exit 1
          fi
          # Fail-closed guard: a clean result is the exact sentinel handled above,
          # so reaching here with zero rows AND a non-zero CLI status means the
          # check did not run cleanly (degenerate/error output) — never pass it.
          if [ "$STATUS" -ne 0 ]; then
            echo "::error::Plugin Check exited non-zero (status=$STATUS) without the clean sentinel. Failing closed."
            exit 1
          fi
          echo "Plugin Check passed: no blocking findings."
