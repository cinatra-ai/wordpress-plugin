name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  php-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.2"
      - name: php -l (lint every PHP file)
        run: |
          set -e
          find . -path ./vendor -prune -o -name '*.php' -print | while read -r f; do
            php -l "$f"
          done

  readme-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: readme.txt has required headers + matching Stable tag
        run: |
          set -e
          test -f readme.txt
          grep -qE '^Stable tag: ' readme.txt
          grep -qE '^License: GPL-2.0-or-later' readme.txt
          stable="$(grep -E '^Stable tag: ' readme.txt | head -1 | sed -E 's/^Stable tag:[[:space:]]*//')"
          header="$(grep -E '^\s*\*\s*Version:' cinatra.php | head -1 | sed -E 's/.*Version:[[:space:]]*//')"
          echo "readme Stable tag = $stable ; plugin header Version = $header"
          test "$stable" = "$header"

  plugin-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Informational until initial findings are triaged (WPD-EXTRACT-03:
    # "Optional WPCS once initial noisy findings are triaged"). The gating jobs
    # are php-lint + readme-validate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: WordPress plugin check
        uses: WordPress/plugin-check-action@18573eb38f13543484a1f095672dae3849a4fbb0 # v1.1.6
        with:
          build-dir: "./"
