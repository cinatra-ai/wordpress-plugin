name: docs-meta-commentary

# Runs the reusable meta-commentary gate (cinatra-ai/ci) against this repo's
# docs/ tree: fails a PR when a published, user-facing integration docs page
# carries meta/implementation commentary about how the docs THEMSELVES are
# produced — generation mechanics, "forthcoming"/placeholder transition notes,
# editorial TODOs, and the like. Wires cinatra-ai/docs#119 into this repo.
#
# Structured like the sibling docs-contract-gate.yml caller: both the workflow
# ref (`@<sha>`) and the `ref` input are pinned to the SAME cinatra-ai/ci commit
# SHA, so the gate engine is not pulled from mutable main.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  meta-commentary-gate:
    uses: cinatra-ai/ci/.github/workflows/meta-commentary-gate.yml@efbefdbd13aada36b68bcef0c52d74a13f7c23f2 # v0.1.3
    with:
      docs: "docs"
      ref: efbefdbd13aada36b68bcef0c52d74a13f7c23f2
